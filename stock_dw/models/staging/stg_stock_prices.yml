version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned daily stock prices with derived metrics"
    columns:
      - name: symbol
        tests:
          - not_null
      - name: price_date
        tests:
          - not_null
      - name: close
        tests:
          - not_null
      - name: volume
        tests:
          - not_null