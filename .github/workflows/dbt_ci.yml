name: dbt CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-test:
    name: Run dbt Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: stocks_dw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dbt-postgres psycopg2-binary pandas boto3 requests python-dotenv

      - name: Load sample data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
          S3_BUCKET_NAME: rithesh-elt-raw-data
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: stocks_dw
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        run: python load_to_postgres.py

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > stock_dw/profiles.yml << EOF
          stock_dw:
            target: dev
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                dbname: stocks_dw
                user: admin
                password: admin123
                schema: public
                threads: 4
          EOF

      - name: Run dbt models
        working-directory: stock_dw
        run: dbt run --profiles-dir .

      - name: Run dbt tests
        working-directory: stock_dw
        run: dbt test --profiles-dir .